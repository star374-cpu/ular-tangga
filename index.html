<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Ular Tangga - Dinamis</title>
    <style>
        :root { --cell-sz: 50px; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; text-align: center; }
        .game-container { display: flex; flex-direction: column; align-items: center; margin-top: 10px; }
        #board { 
            position: relative; width: 500px; height: 500px; 
            background: #fff; border: 6px solid #34495e; display: grid;
            grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr);
        }
        .cell { border: 0.5px solid #eee; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; position: relative; }
        .ladder-cell { background: #e8f8f5; color: #27ae60; font-weight: bold; }
        .snake-cell { background: #fdedec; color: #e74c3c; font-weight: bold; }
        .token { 
            position: absolute; width: 20px; height: 20px; border-radius: 50%; 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; border: 2px solid #fff;
        }
        #token-1 { background: #e74c3c; } /* Player */
        #token-2 { background: #3498db; } /* Bot */
        .controls { margin-top: 15px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #2ecc71; color: white; border: none; border-radius: 8px; font-weight: bold; }
        button:disabled { background: #dcdde1; }
        .log { height: 80px; overflow-y: auto; margin-top: 10px; font-size: 13px; text-align: left; padding: 5px; background: #fafafa; }
    </style>
</head>
<body>

    <h2>Ular Tangga: Efek Angka Dinamis</h2>
    
    <div class="game-container">
        <div id="board">
            </div>

        <div class="controls">
            <div id="status">Giliran Kamu!</div>
            <div id="dice-val" style="font-size: 32px; margin: 10px;">🎲 ?</div>
            <button id="roll-btn" onclick="userAction()">Kocok Dadu</button>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script>
        // Definisi Efek: Positif = Tangga (Naik), Negatif = Ular (Turun)
        const effects = {
            3: 19, 8: 20, 15: 10, 22: 25, 36: 15, 50: 20, 70: 20, // Tangga
            17: -10, 32: -15, 48: -22, 62: -30, 88: -40, 95: -20, 99: -50 // Ular
        };

        let pos = { 1: 1, 2: 1 };
        let currentPlayer = 1;
        let moving = false;

        function createBoard() {
            const board = document.getElementById("board");
            for (let i = 0; i < 100; i++) {
                let row = Math.floor(i / 10);
                let col = i % 10;
                let num = (9 - row) * 10 + (row % 2 === 0 ? 10 - col : col + 1);
                
                let div = document.createElement("div");
                div.className = "cell";
                if (effects[num] > 0) div.classList.add("ladder-cell");
                if (effects[num] < 0) div.classList.add("snake-cell");
                
                div.innerHTML = `<span>${num}</span>` + 
                    (effects[num] ? `<span style="font-size:10px">${effects[num] > 0 ? '🪜 +'+effects[num] : '🐍 '+effects[num]}</span>` : "");
                board.appendChild(div);
            }
            // Tambah token ke board
            const t1 = document.createElement("div"); t1.id = "token-1"; t1.className = "token"; board.appendChild(t1);
            const t2 = document.createElement("div"); t2.id = "token-2"; t2.className = "token"; board.appendChild(t2);
            drawPositions();
        }

        function getXY(n, p) {
            let row = Math.floor((n - 1) / 10);
            let col = (n - 1) % 10;
            if (row % 2 !== 0) col = 9 - col;
            return { x: col * 50 + (p === 1 ? 5 : 25), y: 465 - (row * 50) };
        }

        function drawPositions() {
            [1, 2].forEach(p => {
                const coord = getXY(pos[p], p);
                const el = document.getElementById(`token-${p}`);
                el.style.left = coord.x + "px";
                el.style.top = coord.y + "px";
            });
        }

        function userAction() {
            if (currentPlayer === 1 && !moving) play();
        }

        async function play() {
            moving = true;
            document.getElementById("roll-btn").disabled = true;

            let die = Math.floor(Math.random() * 6) + 1;
            document.getElementById("dice-val").innerText = "🎲 " + die;
            
            // Gerak Normal
            let next = pos[currentPlayer] + die;
            if (next > 100) next = 100;
            
            pos[currentPlayer] = next;
            drawPositions();
            updateLog(`P${currentPlayer} maju ke ${next}`);
            await new Promise(r => setTimeout(r, 600));

            // Cek Efek (Tangga/Ular)
            if (effects[next]) {
                let bonus = effects[next];
                next += bonus;
                if (next < 1) next = 1;
                if (next > 100) next = 100;
                
                pos[currentPlayer] = next;
                drawPositions();
                updateLog(`P${currentPlayer} ${bonus > 0 ? 'NAIK' : 'TURUN'} ke ${next}!`);
                await new Promise(r => setTimeout(r, 600));
            }

            if (pos[currentPlayer] === 100) {
                alert(`Pemain ${currentPlayer} MENANG!`);
                location.reload();
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            moving = false;

            if (currentPlayer === 2) {
                document.getElementById("status").innerText = "Bot lagi jalan...";
                setTimeout(play, 500);
            } else {
                document.getElementById("status").innerText = "Giliran Kamu!";
                document.getElementById("roll-btn").disabled = false;
            }
        }

        function updateLog(msg) {
            const l = document.getElementById("log");
            l.innerHTML = `<div>> ${msg}</div>` + l.innerHTML;
        }

        createBoard();
    </script>
</body>
</html>
